name: Daily Job Scan

on:
  workflow_dispatch:  # manual trigger only — schedule runs in private repo

permissions:
  contents: read

jobs:
  scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Decode credentials
        env:
          GMAIL_CREDENTIALS: ${{ secrets.GMAIL_CREDENTIALS }}
          GMAIL_TOKEN: ${{ secrets.GMAIL_TOKEN }}
        run: |
          python3 - <<'PYEOF'
          import base64, os

          def decode_secret(value):
              """Accept raw JSON or base64-encoded JSON."""
              v = value.strip()
              try:
                  return base64.b64decode(v, validate=False)
              except Exception:
                  return v.encode()

          open('credentials.json', 'wb').write(decode_secret(os.environ['GMAIL_CREDENTIALS']))
          open('token.json',       'wb').write(decode_secret(os.environ['GMAIL_TOKEN']))
          PYEOF

      - name: Snapshot token before run
        run: sha256sum token.json > /tmp/token_before.sha

      - name: Ensure data directory exists
        run: mkdir -p data

      - name: Restore seen-jobs cache
        uses: actions/cache/restore@v4
        with:
          path: data/seen_jobs.json
          key: seen-jobs-${{ github.run_id }}
          restore-keys: seen-jobs-

      - name: Run job scanner
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python main.py --analyze --days 1 2>&1 | tee /tmp/output.txt

      - name: Save seen-jobs cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: data/seen_jobs.json
          key: seen-jobs-${{ github.run_id }}

      - name: Write back refreshed token
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          python - <<'PYEOF'
          import os, hashlib, base64, json, sys, urllib.request
          from nacl.public import SealedBox, PublicKey
          from nacl.encoding import Base64Encoder

          def file_sha256(path):
              h = hashlib.sha256()
              with open(path, 'rb') as f:
                  h.update(f.read())
              return h.hexdigest()

          before = open('/tmp/token_before.sha').read().split()[0]
          after  = file_sha256('token.json')

          if before == after:
              print('token.json unchanged — skipping write-back')
              sys.exit(0)

          print('token.json changed — writing back to GitHub Secrets')
          repo     = os.environ['GITHUB_REPOSITORY']
          gh_token = os.environ['GH_TOKEN']
          headers  = {
              'Authorization':       f'Bearer {gh_token}',
              'Accept':              'application/vnd.github+json',
              'X-GitHub-Api-Version': '2022-11-28',
          }

          # Fetch repo public key for secret encryption
          req = urllib.request.Request(
              f'https://api.github.com/repos/{repo}/actions/secrets/public-key',
              headers=headers,
          )
          with urllib.request.urlopen(req) as r:
              pk = json.loads(r.read())

          pub = PublicKey(pk['key'].encode(), Base64Encoder)
          box = SealedBox(pub)

          with open('token.json', 'rb') as f:
              raw = f.read()

          # Store as base64 so decode_secret can consistently base64-decode it
          raw_b64 = base64.b64encode(raw)
          enc  = base64.b64encode(box.encrypt(raw_b64)).decode()
          body = json.dumps({'encrypted_value': enc, 'key_id': pk['key_id']}).encode()

          put = urllib.request.Request(
              f'https://api.github.com/repos/{repo}/actions/secrets/GMAIL_TOKEN',
              data=body,
              headers={**headers, 'Content-Type': 'application/json'},
              method='PUT',
          )
          with urllib.request.urlopen(put) as r:
              print(f'Write-back HTTP {r.status}')
          PYEOF

      - name: Send results email
        if: always()
        env:
          SMTP_FROM:     ${{ secrets.SMTP_FROM }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          NOTIFY_EMAIL:  ${{ secrets.NOTIFY_EMAIL }}
        run: python core/send_email.py
